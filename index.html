<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>袁鹏A1组 业绩中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@1&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07090d;
      --panel: #151a21;
      --panel2: #0e1319;
      --line: rgba(219, 198, 154, .18);
      --text: #f4efe4;
      --muted: #a8a094;
      --gold: #c9a646;
      --blue: #6f9ab8;
      --green: #6fa787;
      --orange: #c4773e;
      --rose: #b15b64;
      --silver: #c8c1b4;
      --bronze: #9a6841;
      --ink: #0a0b0c;
      --wine: #40242b;
      --moss: #1f3a32;
      --paper: #d8c5a3;
      --radius: 6px;
      --shadow: 0 24px 80px rgba(0, 0, 0, .48);
      --inner-glow: inset 0 1px 0 rgba(255, 244, 216, .06);
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      font-family: "Noto Sans SC", system-ui, sans-serif;
      background:
        radial-gradient(circle at 13% 8%, rgba(201, 166, 70, .2), transparent 26rem),
        radial-gradient(circle at 88% 85%, rgba(64, 36, 43, .42), transparent 34rem),
        radial-gradient(circle at 56% 18%, rgba(31, 58, 50, .24), transparent 30rem),
        linear-gradient(145deg, #08090c 0%, #0e1216 42%, #090a0e 100%),
        var(--bg);
      overflow-x: hidden;
    }
    body::before {
      position: fixed;
      inset: 0;
      z-index: -2;
      content: "";
      background-image:
        linear-gradient(rgba(219, 198, 154, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(219, 198, 154, .04) 1px, transparent 1px),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.045) 0 1px, transparent 1px);
      background-size: 44px 44px, 44px 44px, 6px 6px;
      opacity: .48;
      animation: gridMove 36s linear infinite;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.78), rgba(0,0,0,.36));
    }
    body::after {
      position: fixed;
      inset: 0;
      z-index: -1;
      content: "";
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.035), transparent 18%, rgba(0,0,0,.16) 52%, transparent 80%),
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.52) 100%);
      mix-blend-mode: soft-light;
      opacity: .75;
    }
    button, input, select { font: inherit; }
    button { color: inherit; }
    .app { width: min(1680px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 48px; }
    .header { position: relative; display: flex; justify-content: space-between; align-items: center; gap: 18px; margin-bottom: 24px; padding: 6px 0 18px; border-bottom: 1px solid rgba(219,198,154,.14); }
    .header::before {
      position: absolute;
      left: 0;
      bottom: -1px;
      width: min(360px, 50vw);
      height: 1px;
      content: "";
      background: linear-gradient(90deg, rgba(201,166,70,.8), transparent);
    }
    .eyebrow { margin: 0 0 8px; color: var(--gold); font-size: 12px; font-weight: 900; letter-spacing: .16em; text-transform: uppercase; }
    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h1 { font-family: "Noto Serif SC", serif; font-size: clamp(34px, 4.25vw, 64px); line-height: 1.02; font-weight: 900; text-shadow: 0 12px 34px rgba(0,0,0,.48), 0 0 1px rgba(255,245,220,.72); }
    h2 { font-family: "Noto Serif SC", serif; font-size: 25px; font-weight: 900; }
    .meta { display: flex; justify-content: flex-end; flex-wrap: wrap; gap: 10px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid rgba(219, 198, 154, .16);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(31, 34, 39, .86), rgba(12, 14, 17, .76));
      color: var(--muted);
      white-space: nowrap;
      box-shadow: 0 12px 30px rgba(0, 0, 0, .28), var(--inner-glow);
    }
    .pill strong { color: var(--text); font-family: "JetBrains Mono", monospace; font-size: 14px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--rose); animation: livePulse 1.6s ease-out infinite; }
    .dot.online { background: var(--green); }
    .dot.syncing { background: var(--gold); }
    .fade { opacity: 0; transform: translateY(18px) scale(.992); animation: fadeInUp .88s cubic-bezier(.19, 1, .22, 1) forwards; animation-delay: var(--delay, 0s); }
    .panel, .stat, .toolbar {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 246, 224, .045), transparent 46%),
        linear-gradient(135deg, rgba(31, 34, 39, .94), rgba(12, 15, 19, .94));
      box-shadow: var(--shadow), var(--inner-glow);
      backdrop-filter: blur(18px) saturate(.92);
    }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; margin-bottom: 20px; }
    .stat { position: relative; min-height: 158px; padding: 20px; overflow: hidden; transition: transform .45s cubic-bezier(.19, 1, .22, 1), border-color .45s ease, box-shadow .45s ease; }
    .stat::before {
      position: absolute;
      inset: 0;
      content: "";
      background:
        linear-gradient(115deg, rgba(201,166,70,.16), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(216,197,163,.08), transparent 12rem);
      opacity: .78;
      pointer-events: none;
    }
    .stat::after {
      position: absolute;
      right: 18px;
      bottom: 16px;
      width: 46px;
      height: 46px;
      content: "";
      border-right: 1px solid rgba(216,197,163,.22);
      border-bottom: 1px solid rgba(216,197,163,.18);
      opacity: .72;
    }
    .stat:hover { transform: translateY(-4px); border-color: rgba(201,166,70,.34); box-shadow: 0 30px 90px rgba(0,0,0,.54), 0 0 0 1px rgba(201,166,70,.08); }
    .stat > * { position: relative; z-index: 1; }
    .stat-top { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 18px; color: var(--muted); font-size: 12px; font-weight: 900; letter-spacing: .06em; }
    .stat-value { margin: 0; font-family: "DM Serif Display", serif; font-size: clamp(31px, 3.35vw, 50px); line-height: .96; color: #f8f0df; text-shadow: 0 14px 32px rgba(0,0,0,.45); }
    .stat-sub { margin-top: 12px; color: var(--muted); font-size: 12px; }
    .money { font-family: "JetBrains Mono", monospace; font-variant-numeric: tabular-nums; }
    .green { color: #86efac; }
    .red { color: #fda4af; }
    .gold { color: var(--gold); }
    .blue { color: #93c5fd; }
    .orange { color: #fdba74; }
    .progress { position: relative; height: 8px; margin-top: 13px; overflow: hidden; border-radius: 999px; background: rgba(216,197,163,.14); box-shadow: inset 0 1px 2px rgba(0,0,0,.48); }
    .progress > i { position: absolute; inset: 0 auto 0 0; width: var(--w, 0%); border-radius: inherit; background: linear-gradient(90deg, #b98b33, #f1cf78 54%, #c4773e); overflow: hidden; transition: width .75s cubic-bezier(.19, 1, .22, 1); }
    .progress > i::after { position: absolute; inset: 0; content: ""; background: linear-gradient(110deg, transparent, rgba(255,255,255,.5), transparent); transform: translateX(-100%); animation: shimmer 3.1s cubic-bezier(.19, 1, .22, 1) infinite; }
    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 16px; }
    .section-title span { color: var(--muted); font-size: 13px; }
    .podium-panel { padding: 22px; margin-bottom: 20px; }
    .podium { display: grid; grid-template-columns: 1fr 1.2fr 1fr; align-items: end; gap: 16px; min-height: 220px; }
    .place { position: relative; min-height: 166px; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; border: 1px solid rgba(219,198,154,.14); border-radius: var(--radius); background: linear-gradient(180deg, rgba(21,26,33,.86), rgba(9,11,14,.82)); overflow: hidden; transition: transform .5s cubic-bezier(.19, 1, .22, 1), border-color .4s ease, filter .4s ease; }
    .place::before { position: absolute; inset: auto -18% -54px -18%; height: var(--h, 82px); content: ""; z-index: 0; border-radius: 50% 50% 0 0; background: var(--tone, rgba(148, 163, 184, .15)); filter: blur(.2px); }
    .place::after { position: absolute; inset: 0; content: ""; background: linear-gradient(180deg, rgba(255,255,255,.04), transparent 45%), linear-gradient(90deg, rgba(255,255,255,.04), transparent 8%, transparent 92%, rgba(0,0,0,.18)); opacity: .9; pointer-events: none; }
    .place > * { position: relative; z-index: 1; }
    .place:hover { transform: translateY(-5px); border-color: rgba(201,166,70,.3); filter: saturate(1.06); }
    .place.first { min-height: 214px; border-color: rgba(201,166,70,.62); box-shadow: 0 0 44px rgba(201,166,70,.13), 0 28px 80px rgba(0,0,0,.42); --h: 124px; --tone: linear-gradient(180deg, rgba(201,166,70,.52), rgba(91,65,24,.16)); }
    .place.second { --h: 94px; --tone: linear-gradient(180deg, rgba(200,193,180,.34), rgba(88,88,82,.1)); }
    .place.third { --h: 80px; --tone: linear-gradient(180deg, rgba(154,104,65,.4), rgba(82,52,35,.12)); }
    .crown { display: inline-block; font-size: 25px; animation: bounce 2.8s cubic-bezier(.19, 1, .22, 1) infinite; filter: drop-shadow(0 8px 16px rgba(201,166,70,.32)); }
    .place-rank { margin-bottom: 12px; color: var(--muted); font-weight: 900; }
    .place-name { font-size: 25px; font-weight: 900; }
    .place-account { margin-top: 4px; color: var(--muted); font-size: 13px; }
    .place-money { margin-top: 12px; color: var(--gold); font-family: "JetBrains Mono", monospace; font-size: clamp(22px, 3vw, 34px); font-weight: 900; text-shadow: 0 10px 24px rgba(201,166,70,.2); }
    .toolbar { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 14px; margin-bottom: 20px; }
    .seg { display: inline-flex; gap: 4px; padding: 4px; border: 1px solid rgba(219,198,154,.16); border-radius: var(--radius); background: rgba(7, 9, 13, .48); box-shadow: inset 0 1px 0 rgba(255,255,255,.03); }
    .seg button, .btn, .icon-btn, .type-btn { min-height: 36px; border: 1px solid transparent; border-radius: var(--radius); background: transparent; cursor: pointer; transition: transform .36s cubic-bezier(.19, 1, .22, 1), box-shadow .36s ease, border-color .36s ease, background .36s ease, color .28s ease; }
    .seg button { padding: 8px 13px; color: var(--muted); font-size: 14px; font-weight: 800; }
    .seg button.active { color: #15110a; background: linear-gradient(180deg, #e2c163, #b98b33); box-shadow: 0 10px 24px rgba(201,166,70,.2), inset 0 1px 0 rgba(255,255,255,.26); }
    .actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 9px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 9px 14px; border-color: rgba(219,198,154,.16); background: linear-gradient(180deg, rgba(31,34,39,.78), rgba(12,15,19,.72)); font-weight: 900; white-space: nowrap; box-shadow: var(--inner-glow); }
    .btn.primary { border-color: rgba(201,166,70,.46); background: linear-gradient(135deg, #d1ac43, #b98b33 52%, #b86832); color: #15110a; }
    .btn.danger { border-color: rgba(177,91,100,.38); color: #f0c7c2; background: linear-gradient(180deg, rgba(64,36,43,.54), rgba(22,15,18,.74)); }
    .btn.cloud { border-color: rgba(111,154,184,.36); color: #c8d6dc; }
    .btn:hover, .icon-btn:hover, .type-btn:hover { transform: translateY(-3px); box-shadow: 0 18px 38px rgba(0,0,0,.34), 0 0 0 1px rgba(201,166,70,.08); border-color: rgba(201,166,70,.34); }
    .table-panel { margin-bottom: 20px; overflow: hidden; }
    .scroll { overflow-x: auto; border-radius: var(--radius); }
    table { width: 100%; min-width: 1540px; border-collapse: collapse; }
    th, td { padding: 14px 13px; border-bottom: 1px solid rgba(219,198,154,.09); text-align: left; white-space: nowrap; vertical-align: middle; }
    th { position: sticky; top: 0; z-index: 2; background: linear-gradient(180deg, rgba(16,20,25,.98), rgba(11,14,18,.98)); color: #b9ad99; font-size: 12px; font-weight: 900; letter-spacing: .04em; }
    td { color: #e5ded0; font-size: 14px; }
    tbody tr { transition: background .32s ease, transform .32s cubic-bezier(.19, 1, .22, 1); }
    tbody tr:hover { background: rgba(201,166,70,.075); }
    tbody tr.rank-1 { background: linear-gradient(90deg, rgba(201,166,70,.17), rgba(201,166,70,.025)); }
    tbody tr.rank-2 { background: linear-gradient(90deg, rgba(200,193,180,.12), rgba(200,193,180,.016)); }
    tbody tr.rank-3 { background: linear-gradient(90deg, rgba(154,104,65,.14), rgba(154,104,65,.016)); }
    tbody tr.flash { animation: flashUpdate 1.55s cubic-bezier(.19, 1, .22, 1); }
    .rank { display: inline-flex; align-items: center; justify-content: center; min-width: 34px; height: 28px; padding: 0 8px; border-radius: var(--radius); background: rgba(216,197,163,.12); font-family: "JetBrains Mono", monospace; font-weight: 900; box-shadow: inset 0 1px 0 rgba(255,255,255,.04); }
    .seller { display: flex; flex-direction: column; gap: 3px; }
    .seller strong { color: var(--text); font-size: 15px; }
    .seller span { color: var(--muted); font-size: 12px; }
    .badge { display: inline-flex; justify-content: center; min-width: 54px; padding: 4px 8px; border: 1px solid transparent; border-radius: 999px; font-family: "JetBrains Mono", monospace; font-size: 12px; font-weight: 900; }
    .badge.ok { color: #c8ead4; background: rgba(111,167,135,.14); border-color: rgba(111,167,135,.32); }
    .badge.warn { color: #f0dc93; background: rgba(201,166,70,.12); border-color: rgba(201,166,70,.3); }
    .badge.bad { color: #efc0bd; background: rgba(177,91,100,.12); border-color: rgba(177,91,100,.3); }
    .badge.gray { color: #c8c1b4; background: rgba(216,197,163,.08); border-color: rgba(216,197,163,.18); }
    .money-cell { cursor: pointer; color: var(--text); font-family: "JetBrains Mono", monospace; font-weight: 800; }
    .money-cell:hover { color: var(--gold); text-decoration: underline; text-underline-offset: 4px; }
    .mini-progress { min-width: 152px; }
    .progress-note { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; }
    .streak { display: inline-flex; gap: 5px; padding: 4px 8px; border-radius: 999px; background: rgba(249,115,22,.13); color: #fed7aa; font-family: "JetBrains Mono", monospace; font-weight: 900; }
    .icon-row { display: flex; gap: 6px; }
    .icon-btn { display: inline-grid; place-items: center; width: 36px; min-width: 36px; height: 36px; border-color: rgba(219,198,154,.16); background: rgba(7,9,13,.42); font-size: 16px; }
    .icon-btn:disabled { opacity: .38; cursor: not-allowed; transform: none; box-shadow: none; }
    .charts { display: grid; grid-template-columns: 1.5fr 1fr; gap: 18px; }
    .chart-panel, .quick-panel { min-height: 360px; padding: 22px; }
    .chart-wrap { position: relative; min-height: 294px; }
    .chart-wrap svg { width: 100%; height: 294px; display: block; }
    .grid-line { stroke: rgba(219,198,154,.13); stroke-width: 1; }
    .axis { fill: #a8a094; font-family: "JetBrains Mono", monospace; font-size: 11px; }
    .trend-line { fill: none; stroke: var(--gold); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 12px rgba(201,166,70,.26)); stroke-dasharray: 900; animation: lineDraw 1.25s cubic-bezier(.19, 1, .22, 1) both; }
    .trend-area { fill: url(#trendGradient); }
    .point { fill: #07090d; stroke: var(--gold); stroke-width: 2; cursor: pointer; transition: r .22s ease, filter .22s ease; }
    .point:hover { filter: drop-shadow(0 0 8px rgba(201,166,70,.42)); }
    .tooltip { position: absolute; left: 0; top: 0; z-index: 5; padding: 9px 11px; border: 1px solid rgba(201,166,70,.38); border-radius: var(--radius); background: rgba(10,11,12,.94); font-size: 12px; opacity: 0; pointer-events: none; transition: opacity .18s ease, transform .18s ease; transform: translateY(4px); box-shadow: 0 14px 34px rgba(0,0,0,.36); }
    .tooltip.show { opacity: 1; transform: translateY(0); }
    .quick-list { display: flex; flex-direction: column; gap: 10px; }
    .quick-item { padding: 13px; border: 1px solid rgba(219,198,154,.13); border-radius: var(--radius); background: rgba(7,9,13,.34); transition: transform .35s cubic-bezier(.19, 1, .22, 1), border-color .35s ease, background .35s ease; }
    .quick-item:hover { transform: translateX(4px); border-color: rgba(201,166,70,.28); background: rgba(21,26,33,.44); }
    .quick-line { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .quick-line span { color: var(--muted); font-size: 12px; }
    .bar { height: 8px; overflow: hidden; border-radius: 999px; background: rgba(216,197,163,.13); }
    .bar i { display: block; width: var(--w, 0%); height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--blue), var(--green), var(--gold)); transition: width .7s cubic-bezier(.19, 1, .22, 1); }
    .follow-panel { padding: 22px; margin-bottom: 20px; overflow: hidden; }
    .follow-layout { display: grid; grid-template-columns: 280px minmax(0, 1fr); gap: 14px; align-items: stretch; }
    .follow-stats { display: grid; gap: 10px; }
    .follow-stat { padding: 14px; border: 1px solid rgba(219,198,154,.14); border-radius: var(--radius); background: rgba(7,9,13,.34); box-shadow: var(--inner-glow); }
    .follow-stat strong { display: block; margin-top: 6px; color: #f8f0df; font-family: "JetBrains Mono", monospace; font-size: 22px; }
    .follow-list { display: grid; grid-template-columns: repeat(3, minmax(220px, 1fr)); gap: 12px; }
    .follow-card { position: relative; min-height: 168px; padding: 14px; border: 1px solid rgba(219,198,154,.14); border-radius: var(--radius); background: linear-gradient(180deg, rgba(21,26,33,.76), rgba(7,9,13,.72)); box-shadow: var(--inner-glow); overflow: hidden; animation: slideIn .36s cubic-bezier(.19, 1, .22, 1) both; transition: transform .35s cubic-bezier(.19, 1, .22, 1), border-color .35s ease, background .35s ease; }
    .follow-card::before { position: absolute; inset: auto -20% -46px -20%; height: 86px; content: ""; border-radius: 50% 50% 0 0; background: linear-gradient(180deg, rgba(201,166,70,.16), transparent); pointer-events: none; }
    .follow-card.overdue { border-color: rgba(177,91,100,.32); }
    .follow-card.reminded { border-color: rgba(111,154,184,.34); }
    .follow-card:hover { transform: translateY(-4px); border-color: rgba(201,166,70,.34); background: linear-gradient(180deg, rgba(25,30,37,.82), rgba(9,12,16,.78)); }
    .follow-top, .follow-money, .follow-actions { position: relative; z-index: 1; }
    .follow-top { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .follow-name { display: flex; flex-direction: column; gap: 3px; }
    .follow-name strong { color: var(--text); font-size: 16px; }
    .follow-name span, .follow-date { color: var(--muted); font-size: 12px; }
    .follow-status { align-self: flex-start; padding: 4px 8px; border: 1px solid rgba(201,166,70,.26); border-radius: 999px; color: #ead59a; background: rgba(201,166,70,.1); font-size: 12px; font-weight: 900; white-space: nowrap; }
    .follow-status.reminded { border-color: rgba(111,154,184,.34); color: #c8d6dc; background: rgba(111,154,184,.12); }
    .follow-money { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-bottom: 12px; }
    .follow-money span { display: block; color: var(--muted); font-size: 11px; }
    .follow-money strong { display: block; margin-top: 4px; font-family: "JetBrains Mono", monospace; font-size: 14px; }
    .follow-actions { display: flex; flex-wrap: wrap; gap: 7px; }
    .follow-actions .btn { min-height: 32px; padding: 6px 9px; font-size: 12px; }
    .modal-layer { position: fixed; inset: 0; z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px; background: rgba(5,7,10,.76); backdrop-filter: blur(18px) saturate(.92); }
    .modal-layer.open { display: flex; }
    .modal { width: min(980px, 100%); max-height: min(88vh, 920px); overflow: hidden; border: 1px solid rgba(201,166,70,.24); border-radius: var(--radius); background: linear-gradient(180deg, rgba(25,29,36,.98), rgba(9,12,16,.98)); box-shadow: 0 34px 110px rgba(0,0,0,.58), var(--inner-glow); animation: modalIn .34s cubic-bezier(.19, 1, .22, 1) forwards; }
    .modal.narrow { width: min(680px, 100%); }
    .modal.wide { width: min(1120px, 100%); }
    .modal-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 18px; padding: 20px 20px 14px; border-bottom: 1px solid var(--line); }
    .modal-head h2 { font-family: "Noto Serif SC", serif; font-size: 24px; }
    .modal-sub { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .close { display: inline-grid; place-items: center; width: 38px; height: 38px; border: 1px solid var(--line); border-radius: var(--radius); background: rgba(10,14,26,.36); color: var(--muted); cursor: pointer; font-size: 22px; }
    .modal-body { max-height: calc(min(88vh, 920px) - 78px); padding: 20px; overflow: auto; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .goal-grid { display: grid; grid-template-columns: repeat(7, minmax(140px, 1fr)); gap: 12px; }
    .summary-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
    .summary-grid.dense { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .field { display: flex; flex-direction: column; gap: 7px; }

    .type-tag { display: inline-flex; justify-content: center; padding: 4px 8px; border-radius: 999px; font-size: 12px; font-weight: 900; }
    .type-tag.full { color: #10131f; background: var(--gold); }

    .type-tag.final { color: #dcfce7; background: rgba(16,185,129,.72); }
    .empty { padding: 28px; border: 1px dashed rgba(219,198,154,.22); border-radius: var(--radius); color: var(--muted); text-align: center; background: rgba(7,9,13,.24); }
    .daily-table { min-width: 860px; }
    .toast-stack { position: fixed; right: 18px; bottom: 18px; z-index: 80; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { min-width: min(340px, calc(100vw - 36px)); padding: 12px 14px; border: 1px solid rgba(111,167,135,.28); border-radius: var(--radius); background: rgba(10,13,17,.96); color: var(--text); box-shadow: 0 18px 44px rgba(0,0,0,.4), var(--inner-glow); animation: toastIn .28s cubic-bezier(.19, 1, .22, 1) both; }
    @keyframes gridMove { from { background-position: 0 0, 0 0, 0 0; } to { background-position: 88px 88px, 88px 88px, 18px 18px; } }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes livePulse { 0% { box-shadow: 0 0 0 0 rgba(177,91,100,.5); } 70% { box-shadow: 0 0 0 9px rgba(177,91,100,0); } 100% { box-shadow: 0 0 0 0 rgba(177,91,100,0); } }
    @keyframes bounce { 0%,100% { transform: translateY(0) rotate(-4deg); } 45% { transform: translateY(-7px) rotate(3deg); } }
    @keyframes shimmer { to { transform: translateX(140%); } }
    @keyframes lineDraw { from { stroke-dashoffset: 900; opacity: .28; } to { stroke-dashoffset: 0; opacity: 1; } }
    @keyframes flashUpdate { 0%,100% { box-shadow: inset 0 0 0 rgba(201,166,70,0); } 18%,60% { box-shadow: inset 0 0 0 999px rgba(201,166,70,.16); } }
    @keyframes modalIn { from { opacity: 0; transform: scale(.975) translateY(14px); filter: blur(6px); } to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; scroll-behavior: auto !important; transition-duration: .01ms !important; }
    }
    @media (max-width: 1180px) { .stats, .charts { grid-template-columns: repeat(2, minmax(0, 1fr)); } .chart-panel { grid-column: 1 / -1; } .goal-grid, .summary-grid.dense { grid-template-columns: repeat(3, minmax(0, 1fr)); } .follow-layout { grid-template-columns: 1fr; } .follow-stats { grid-template-columns: repeat(3, minmax(0, 1fr)); } .follow-list { grid-template-columns: repeat(2, minmax(220px, 1fr)); } }
    @media (max-width: 760px) { .app { width: min(100% - 20px, 1680px); padding-top: 18px; } .header, .toolbar { align-items: stretch; flex-direction: column; } .meta, .actions { justify-content: flex-start; } .stats, .charts, .summary-grid, .summary-grid.dense, .form-grid, .goal-grid, .follow-stats, .follow-list { grid-template-columns: repeat(2, minmax(0, 1fr)); } .podium { grid-template-columns: 1fr; } .place.first { order: -1; } .tx-entry, .tx-entry.deposit-mode { grid-template-columns: 1fr; } .type-toggle { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); } .tx-item { grid-template-columns: 44px 84px minmax(100px, 1fr) 38px; } }
    @media (max-width: 520px) { h1 { font-size: 31px; } .stats, .summary-grid, .summary-grid.dense, .form-grid, .goal-grid, .follow-stats, .follow-list { grid-template-columns: 1fr; } .seg { width: 100%; } .seg button, .btn { flex: 1; } .actions { display: grid; grid-template-columns: 1fr; } }

</head>
<body>

          </div>
        </div>
        <div class="panel quick-panel">
          <div class="section-title">

  </div>

  <div class="modal-layer" id="modalLayer"></div>
  <div class="toast-stack" id="toastStack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "yuanpeng_a1_sales_dashboard_v1";
      const SYNC_CONFIG_KEY = "yuanpeng_a1_supabase_config_v1";
      const SUPABASE_TABLE = "sales_dashboard_state";
      const CLOUD_ROW_ID = "yuanpeng_a1";
      const EMBEDDED_SUPABASE_CONFIG = {
        url: "https://enqrpqyzrrygahabztnc.supabase.co",
        anonKey: "sb_publishable_kwAu2zG7R2DkaGFgtwxCDg_AHGsYqeW"
      };

      const people = [
        { id: "B", account: "小红书B", name: "袁鹏" },
        { id: "E", account: "小红书E", name: "黄惠丹" },
        { id: "C", account: "小红书C", name: "凌洁莹" },
        { id: "L", account: "小红书L", name: "王怡然" },
        { id: "F", account: "小红书F", name: "曾景昇" },
        { id: "D", account: "小红书D", name: "刘宇哲" },
        { id: "G", account: "小红书G", name: "马允宏" }
      ];

      const typeMeta = {
        full: { label: "全款", key: "fullPayment", className: "full" },
        deposit: { label: "定金", key: "deposit", className: "deposit" },
        final: { label: "尾款", key: "finalPayment", className: "final" }
      };

      const $ = (selector, root = document) => root.querySelector(selector);
      const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
      let state = loadState();
      let sortMode = "today";
      let flashPersonId = "";
      let txModal = { personId: "", date: "", type: "full" };
      let syncConfig = loadSyncConfig();
      let supabaseClient = null;
      let realtimeChannel = null;
      let authSubscription = null;
      let currentUser = null;
      let remoteSaveTimer = 0;
      let remoteReady = false;
      let applyingRemote = false;

      function pad2(value) { return String(value).padStart(2, "0"); }
      function dateKey(date = new Date()) { return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`; }
      function parseDate(key) { const [y, m, d] = key.split("-").map(Number); return new Date(y, m - 1, d); }
      function addDays(key, offset) { const date = parseDate(key); date.setDate(date.getDate() + offset); return dateKey(date); }
      function monthKey(key = dateKey()) { return key.slice(0, 7); }
      function daysInMonth(month = monthKey()) { const [y, m] = month.split("-").map(Number); return new Date(y, m, 0).getDate(); }
      function dayKeyOfMonth(month, day) { return `${month}-${pad2(day)}`; }
      function currentDayNumber() { return parseDate(dateKey()).getDate(); }
      function daysLeftInCurrentMonth() { return Math.max(daysInMonth(monthKey()) - currentDayNumber(), 0); }
      function safeNumber(value) { const num = Number(value); return Number.isFinite(num) && num > 0 ? Math.round(num * 100) / 100 : 0; }
      function safeInteger(value) { const num = Number(value); return Number.isFinite(num) && num > 0 ? Math.floor(num) : 0; }
      function txId() { return `tx_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`; }
      function escapeHTML(value) { return String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char])); }
      function money(value, digits = 0) {
        return new Intl.NumberFormat("zh-CN", { style: "currency", currency: "CNY", minimumFractionDigits: digits, maximumFractionDigits: digits }).format(safeNumber(value));
      }
      function percent(value, digits = 1) { return `${safeNumber(value).toFixed(digits)}%`; }
      function formatDateCN(key) { return parseDate(key).toLocaleDateString("zh-CN", { month: "long", day: "numeric", weekday: "long" }); }

      function defaultState() {
        const entries = {};
        const goals = {};
        people.forEach((person) => { entries[person.id] = []; goals[person.id] = 50000; });
        return { entries, goals, meta: { goals: {}, entries: {}, deletedTx: {}, deletedDays: {} } };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? normalizeState(JSON.parse(raw)) : defaultState();
        } catch (error) {
          console.warn(error);
          return defaultState();
        }
      }

      function normalizeState(input) {
        const next = defaultState();
        if (!input || typeof input !== "object") return next;
        people.forEach((person) => {
          const list = input.entries && Array.isArray(input.entries[person.id]) ? input.entries[person.id] : [];
          next.entries[person.id] = list.map(normalizeEntry).filter(Boolean);
          const hasGoal = input.goals && Object.prototype.hasOwnProperty.call(input.goals, person.id);
          next.goals[person.id] = hasGoal ? safeNumber(input.goals[person.id]) : 50000;
        });
        next.meta = {
          goals: input.meta && input.meta.goals && typeof input.meta.goals === "object" ? input.meta.goals : {},
          entries: input.meta && input.meta.entries && typeof input.meta.entries === "object" ? input.meta.entries : {},
          deletedTx: input.meta && input.meta.deletedTx && typeof input.meta.deletedTx === "object" ? input.meta.deletedTx : {},
          deletedDays: input.meta && input.meta.deletedDays && typeof input.meta.deletedDays === "object" ? input.meta.deletedDays : {}
        };
        applyDeletedMarkers(next);
        return next;
      }

      function normalizeEntry(entry) {
        if (!entry || typeof entry !== "object") return null;
        const normalized = {
          date: /^\d{4}-\d{2}-\d{2}$/.test(entry.date || "") ? entry.date : dateKey(),
          privateCount: safeInteger(entry.privateCount),
          dealsCount: safeInteger(entry.dealsCount),
          deposit: 0,
          depositOrderAmount: 0,
          finalPayment: 0,
          fullPayment: 0,
          performanceTotal: 0,
          transactions: []
        };
        const sourceTxs = Array.isArray(entry.transactions) ? entry.transactions : [];
        sourceTxs.forEach((tx) => {
          const amount = safeNumber(tx && tx.amount);
          const type = tx && typeMeta[tx.type] ? tx.type : "";
          if (!amount || !type) return;
          const normalizedTx = { id: tx.id || txId(), amount, type, createdAt: tx.createdAt || new Date().toISOString() };
          if (type === "deposit") {
            normalizedTx.orderAmount = safeNumber(tx.orderAmount) || safeNumber(tx.dealAmount) || amount;
            normalizedTx.customerName = String(tx.customerName || tx.customer || "").trim();
            normalizedTx.followStatus = ["pending", "reminded", "closed", "lost"].includes(tx.followStatus) ? tx.followStatus : "pending";
            normalizedTx.followUpdatedAt = tx.followUpdatedAt || tx.createdAt || normalizedTx.createdAt;
          }
          normalized.transactions.push(normalizedTx);
        });
        if (!normalized.transactions.length) {
          [["deposit", "deposit"], ["finalPayment", "final"], ["fullPayment", "full"]].forEach(([field, type]) => {
            const amount = safeNumber(entry[field]);
            if (!amount) return;
            const legacyTx = { id: txId(), amount, type };
            legacyTx.createdAt = new Date().toISOString();
            if (type === "deposit") {
              legacyTx.orderAmount = safeNumber(entry.depositOrderAmount) || amount;
              legacyTx.customerName = "";
              legacyTx.followStatus = "pending";
              legacyTx.followUpdatedAt = legacyTx.createdAt;
            }
            normalized.transactions.push(legacyTx);
          });
        }
        return recalcEntry(normalized);
      }

      function recalcEntry(entry) {
        entry.deposit = 0;
        entry.depositOrderAmount = 0;
        entry.finalPayment = 0;
        entry.fullPayment = 0;
        entry.performanceTotal = 0;
        entry.transactions.forEach((tx) => {
          const amount = safeNumber(tx.amount);
          if (tx.type === "deposit") {
            entry.deposit += amount;
            entry.depositOrderAmount += safeNumber(tx.orderAmount) || amount;
          }
          if (tx.type === "final") entry.finalPayment += amount;
          if (tx.type === "full") entry.fullPayment += amount;
        });
        entry.deposit = Math.round(entry.deposit * 100) / 100;
        entry.depositOrderAmount = Math.round(entry.depositOrderAmount * 100) / 100;
        entry.finalPayment = Math.round(entry.finalPayment * 100) / 100;
        entry.fullPayment = Math.round(entry.fullPayment * 100) / 100;
        entry.performanceTotal = Math.round((entry.depositOrderAmount + entry.fullPayment) * 100) / 100;
        return entry;
      }

      function cleanupEntries() {
        state.meta = state.meta || { goals: {}, entries: {}, deletedTx: {}, deletedDays: {} };
        applyDeletedMarkers(state);
        people.forEach((person) => {
          state.entries[person.id] = (state.entries[person.id] || [])
            .map(normalizeEntry)
            .filter((entry) => entry.privateCount || entry.dealsCount || entry.transactions.length);
        });
      }

      function persistLocalState() {
        cleanupEntries();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function saveState(options = {}) {
        persistLocalState();
        if (options.remote !== false && !applyingRemote) queueRemoteSave();
      }

      function nowIso() { return new Date().toISOString(); }
      function entryMetaKey(personId, day) { return `${personId}|${day}`; }
      function markEntryUpdated(personId, day) {
        state.meta = state.meta || { goals: {}, entries: {}, deletedTx: {}, deletedDays: {} };
        state.meta.entries = state.meta.entries || {};
        state.meta.entries[entryMetaKey(personId, day)] = nowIso();
      }
      function markGoalUpdated(personId) {
        state.meta = state.meta || { goals: {}, entries: {}, deletedTx: {}, deletedDays: {} };
        state.meta.goals = state.meta.goals || {};
        state.meta.goals[personId] = nowIso();
      }
      function markTransactionDeleted(txId) {
        state.meta = state.meta || { goals: {}, entries: {}, deletedTx: {}, deletedDays: {} };
        state.meta.deletedTx = state.meta.deletedTx || {};
        state.meta.deletedTx[txId] = nowIso();
      }
      function markDayDeleted(personId, day) {
        state.meta = state.meta || { goals: {}, entries: {}, deletedTx: {}, deletedDays: {} };
        state.meta.deletedDays = state.meta.deletedDays || {};
        state.meta.deletedDays[entryMetaKey(personId, day)] = nowIso();
      }

      function applyDeletedMarkers(targetState) {
        const deletedTx = targetState.meta && targetState.meta.deletedTx ? targetState.meta.deletedTx : {};
        const deletedDays = targetState.meta && targetState.meta.deletedDays ? targetState.meta.deletedDays : {};
        people.forEach((person) => {
          targetState.entries[person.id] = (targetState.entries[person.id] || [])
            .filter((entry) => !deletedDays[entryMetaKey(person.id, entry.date)])
            .map((entry) => {
              entry.transactions = (entry.transactions || []).filter((tx) => !deletedTx[tx.id]);
              return recalcEntry(entry);
            });
        });
      }

      function getPerson(id) { return people.find((person) => person.id === id); }
      function getEntry(personId, day) { return (state.entries[personId] || []).find((entry) => entry.date === day) || null; }
      function ensureEntry(personId, day) {
        let entry = getEntry(personId, day);
        if (!entry) {
          entry = { date: day, privateCount: 0, dealsCount: 0, deposit: 0, depositOrderAmount: 0, finalPayment: 0, fullPayment: 0, performanceTotal: 0, transactions: [] };
          state.entries[personId].push(entry);
        }
        return entry;
      }
      function removeEntry(personId, day) { state.entries[personId] = (state.entries[personId] || []).filter((entry) => entry.date !== day); }

      function emptyMetrics() {
        return { privateCount: 0, dealsCount: 0, deposit: 0, depositOrderAmount: 0, finalPayment: 0, fullPayment: 0, total: 0, cashReceived: 0, fullCount: 0, depositCount: 0, finalCount: 0, transactionCount: 0 };
      }

      function newerTime(a, b) {
        return new Date(a || 0).getTime() >= new Date(b || 0).getTime();
      }

      function mergeStates(remoteInput, localInput) {
        const remote = normalizeState(remoteInput || defaultState());
        const local = normalizeState(localInput || defaultState());
        const merged = defaultState();
        merged.meta = {
          goals: { ...(remote.meta && remote.meta.goals ? remote.meta.goals : {}), ...(local.meta && local.meta.goals ? local.meta.goals : {}) },
          entries: { ...(remote.meta && remote.meta.entries ? remote.meta.entries : {}), ...(local.meta && local.meta.entries ? local.meta.entries : {}) },
          deletedTx: { ...(remote.meta && remote.meta.deletedTx ? remote.meta.deletedTx : {}), ...(local.meta && local.meta.deletedTx ? local.meta.deletedTx : {}) },
          deletedDays: { ...(remote.meta && remote.meta.deletedDays ? remote.meta.deletedDays : {}), ...(local.meta && local.meta.deletedDays ? local.meta.deletedDays : {}) }
        };

        people.forEach((person) => {
          const remoteGoalTime = remote.meta.goals[person.id];
          const localGoalTime = local.meta.goals[person.id];
          if (remoteGoalTime || localGoalTime) {
            merged.goals[person.id] = newerTime(localGoalTime, remoteGoalTime) ? local.goals[person.id] : remote.goals[person.id];
            merged.meta.goals[person.id] = newerTime(localGoalTime, remoteGoalTime) ? localGoalTime : remoteGoalTime;
          } else {
            merged.goals[person.id] = Math.max(safeNumber(remote.goals[person.id]), safeNumber(local.goals[person.id]), 50000);
          }

          const byDate = new Map();
          [...(remote.entries[person.id] || []), ...(local.entries[person.id] || [])].forEach((entry) => {
            if (merged.meta.deletedDays[entryMetaKey(person.id, entry.date)]) return;
            const existing = byDate.get(entry.date);
            if (!existing) byDate.set(entry.date, normalizeEntry(entry));
            else byDate.set(entry.date, mergeEntries(person.id, existing, entry, remote.meta, local.meta, merged.meta));
          });
          merged.entries[person.id] = Array.from(byDate.values())
            .map(recalcEntry)
            .filter((entry) => entry.privateCount || entry.dealsCount || entry.transactions.length)
            .sort((a, b) => a.date.localeCompare(b.date));
        });
        return normalizeState(merged);
      }

      function mergeEntries(personId, aInput, bInput, remoteMeta, localMeta, mergedMeta) {
        const a = normalizeEntry(aInput);
        const b = normalizeEntry(bInput);
        const key = entryMetaKey(personId, a.date);
        const aTime = remoteMeta.entries && remoteMeta.entries[key] ? remoteMeta.entries[key] : "";
        const bTime = localMeta.entries && localMeta.entries[key] ? localMeta.entries[key] : "";
        const metricSource = newerTime(bTime, aTime) ? b : a;
        const deletedTx = mergedMeta.deletedTx || {};
        const txMap = new Map();
        [...(a.transactions || []), ...(b.transactions || [])].forEach((tx) => {
          if (deletedTx[tx.id]) return;
          const existing = txMap.get(tx.id);
          if (!existing || newerTime(tx.followUpdatedAt || tx.createdAt, existing.followUpdatedAt || existing.createdAt)) txMap.set(tx.id, { ...tx });
        });
        return recalcEntry({
          date: a.date,
          privateCount: metricSource.privateCount,
          dealsCount: metricSource.dealsCount,
          deposit: 0,
          depositOrderAmount: 0,
          finalPayment: 0,
          fullPayment: 0,
          performanceTotal: 0,
          transactions: Array.from(txMap.values())
        });
      }

      function summarizeEntry(entry) {
        const metrics = emptyMetrics();
        if (!entry) return metrics;
        recalcEntry(entry);
        metrics.privateCount = safeInteger(entry.privateCount);
        metrics.dealsCount = safeInteger(entry.dealsCount);
        metrics.deposit = safeNumber(entry.deposit);
        metrics.depositOrderAmount = safeNumber(entry.depositOrderAmount);
        metrics.finalPayment = safeNumber(entry.finalPayment);
        metrics.fullPayment = safeNumber(entry.fullPayment);
        metrics.total = safeNumber(entry.performanceTotal);
        metrics.cashReceived = metrics.deposit + metrics.finalPayment + metrics.fullPayment;
        (entry.transactions || []).forEach((tx) => {
          if (tx.type === "full") metrics.fullCount += 1;
          if (tx.type === "deposit") metrics.depositCount += 1;
          if (tx.type === "final") metrics.finalCount += 1;
        });
        metrics.transactionCount = metrics.fullCount + metrics.depositCount + metrics.finalCount;
        return metrics;
      }
      function addMetrics(sum, item) {
        Object.keys(sum).forEach((key) => { sum[key] += item[key] || 0; });
        sum.total = sum.depositOrderAmount + sum.fullPayment;
        sum.cashReceived = sum.deposit + sum.finalPayment + sum.fullPayment;
        return sum;
      }
      function dayMetrics(personId, day = dateKey()) { return summarizeEntry(getEntry(personId, day)); }
      function monthMetrics(personId, month = monthKey()) {
        return (state.entries[personId] || []).filter((entry) => entry.date.startsWith(month)).reduce((sum, entry) => addMetrics(sum, summarizeEntry(entry)), emptyMetrics());
      }
      function teamMetricsForDay(day = dateKey()) { return people.reduce((sum, person) => addMetrics(sum, dayMetrics(person.id, day)), emptyMetrics()); }
      function teamMetricsForMonth(month = monthKey()) { return people.reduce((sum, person) => addMetrics(sum, monthMetrics(person.id, month)), emptyMetrics()); }
      function dailyNeeded(done, goal) { const gap = Math.max(goal - done, 0); return gap ? gap / Math.max(daysLeftInCurrentMonth(), 1) : 0; }
      function streakDays(personId, goal, month = monthKey()) {
        if (!goal) return 0;
        const dailyTarget = goal / daysInMonth(month);
        let streak = 0;
        for (let day = dateKey(); day.startsWith(month); day = addDays(day, -1)) {
          if (dayMetrics(personId, day).total >= dailyTarget) streak += 1;
          else break;
        }
        return streak;
      }
      function snapshot(person) {
        const today = dayMetrics(person.id);
        const monthly = monthMetrics(person.id);
        const goal = safeNumber(state.goals[person.id]);
        const progress = goal ? (monthly.total / goal) * 100 : 0;
        return { person, today, monthly, goal, progress, dailyNeed: dailyNeeded(monthly.total, goal), streak: streakDays(person.id, goal) };
      }

      function renderAll(nextFlashPersonId = "") {
        flashPersonId = nextFlashPersonId;
        renderDate();
        renderStats();
        renderPodium();
        renderRanking();
        renderChart();

        renderQuickList();

      function renderDate() {

      function renderStats() {
        const teamMonth = teamMetricsForMonth();
        const teamToday = teamMetricsForDay();
        const teamYesterday = teamMetricsForDay(addDays(dateKey(), -1));
        const teamGoal = people.reduce((sum, person) => sum + safeNumber(state.goals[person.id]), 0);
        const progress = teamGoal ? (teamMonth.total / teamGoal) * 100 : 0;
        const delta = compareDelta(teamToday.total, teamYesterday.total);
        const dailyNeed = dailyNeeded(teamMonth.total, teamGoal);
        $("#stats").innerHTML = [
          statCard("本月团队业绩", money(teamMonth.total), `目标 ${money(teamGoal)} · 完成 ${percent(progress)}`, "🏆", progress),
          statCard("今日实际成交", money(teamToday.total), `${teamToday.transactionCount} 笔明细 · <span class="${delta.className}">${delta.text}</span>`, "⚡"),
          statCard("本月已收实款", money(teamMonth.cashReceived), `全款 ${money(teamMonth.fullPayment)} · 定金 ${money(teamMonth.deposit)} · 尾款 ${money(teamMonth.finalPayment)}`, "💳"),
          statCard("本月剩余天数", `${daysLeftInCurrentMonth()} 天`, `团队日均还需 <span class="${dailyNeed > 0 ? "red" : "green"}">${money(dailyNeed)}</span>`, "⏳")
        ].join("");
      }
      function statCard(label, value, sub, icon, progressValue) {
        const progress = typeof progressValue === "number" ? `<div class="progress"><i style="--w:${Math.min(progressValue, 100)}%"></i></div>` : "";
        return `<article class="stat"><div class="stat-top"><span>${label}</span><span>${icon}</span></div><p class="stat-value">${value}</p>${progress}<div class="stat-sub">${sub}</div></article>`;
      }
      function compareDelta(today, yesterday) {
        if (!yesterday && !today) return { text: "较昨日持平", className: "" };
        if (!yesterday) return { text: "昨日无数据", className: "green" };
        const ratio = ((today - yesterday) / yesterday) * 100;
        return ratio >= 0 ? { text: `较昨日 ↑ ${Math.abs(ratio).toFixed(1)}%`, className: "green" } : { text: `较昨日 ↓ ${Math.abs(ratio).toFixed(1)}%`, className: "red" };
      }
      function renderPodium() {
        $("#podiumDate").textContent = formatDateCN(dateKey());
        const ranked = people.map((person) => ({ person, metrics: dayMetrics(person.id) })).filter((item) => item.metrics.total > 0).sort((a, b) => b.metrics.total - a.metrics.total || b.metrics.transactionCount - a.metrics.transactionCount).slice(0, 3);
        $("#podium").innerHTML = [podiumPlace(ranked[1], 2, "second"), podiumPlace(ranked[0], 1, "first"), podiumPlace(ranked[2], 3, "third")].join("");
      }
      function podiumPlace(item, rank, className) {
        if (!item) return `<div class="place ${className}"><div class="place-rank">NO.${rank}</div><div class="place-account">等待上榜</div></div>`;
        const crown = rank === 1 ? `<span class="crown">👑</span>` : "";
        return `<div class="place ${className}"><div class="place-rank">${crown} NO.${rank}</div><div class="place-name">${escapeHTML(item.person.name)}</div><div class="place-account">${escapeHTML(item.person.account)}</div><div class="place-money">${money(item.metrics.total)}</div><div class="place-account">${item.metrics.transactionCount} 笔成交明细</div></div>`;
      }
      function renderRanking() {
        const rows = people.map(snapshot).sort((a, b) => {
          const primary = sortMode === "today" ? b.today.total - a.today.total : b.monthly.total - a.monthly.total;
          return primary || b.monthly.total - a.monthly.total || a.person.name.localeCompare(b.person.name, "zh-CN");
        });
        $("#ranking").innerHTML = rows.map((item, index) => rankingRow(item, index + 1)).join("");
      }
      function rankingRow(item, rank) {
        const { person, today, monthly, goal, progress, dailyNeed, streak } = item;
        const conversion = today.privateCount ? (today.dealsCount / today.privateCount) * 100 : 0;
        return `

            <td class="money">${today.privateCount}</td>
            <td class="money">${today.dealsCount}</td>

            <td class="money-cell green" data-person="${person.id}">${money(today.finalPayment)}</td>
            <td class="money-cell gold" data-person="${person.id}">${money(today.fullPayment)}</td>

            <td class="money blue">${money(monthly.deposit)}</td>
            <td class="money green">${money(monthly.finalPayment)}</td>

            <td class="money orange">${money(monthly.total)}</td>

            <td><div class="icon-row"><button class="icon-btn" data-action="details" data-person="${person.id}" title="月度详情">📊</button><button class="icon-btn" data-action="tx" data-person="${person.id}" title="录入成交">💰</button><button class="icon-btn" data-action="metrics" data-person="${person.id}" title="录入指标">✏️</button></div></td>
          </tr>
        `;
      }
      function conversionBadge(value, hasPrivateCount) {
        if (!hasPrivateCount) return `<span class="badge gray">--</span>`;
        const className = value >= 25 ? "ok" : value >= 12 ? "warn" : "bad";
        return `<span class="badge ${className}">${value.toFixed(1)}%</span>`;
      }
      function progressBlock(value, goal) {
        const shown = Math.min(value, 100);
        return `<div class="mini-progress"><div class="progress-note"><strong>${goal ? percent(value) : "未设置"}</strong><span>${money(goal)}</span></div><div class="progress"><i style="--w:${shown}%"></i></div></div>`;
      }

      function renderChart() {
        const month = monthKey();
        $("#chartMonth").textContent = month;
        const totalDays = daysInMonth(month);
        const values = Array.from({ length: totalDays }, (_, i) => teamMetricsForDay(dayKeyOfMonth(month, i + 1)).total);
        const max = Math.max(...values, 1);
        const width = 800, height = 300;
        const pad = { left: 56, right: 22, top: 24, bottom: 38 };
        const plotW = width - pad.left - pad.right;
        const plotH = height - pad.top - pad.bottom;
        const baseY = height - pad.bottom;
        const points = values.map((value, i) => ({ day: i + 1, value, x: pad.left + (totalDays === 1 ? 0 : (i / (totalDays - 1)) * plotW), y: pad.top + plotH - (value / max) * plotH }));
        const line = points.map((p, i) => `${i ? "L" : "M"}${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(" ");
        const area = `${line} L${points[points.length - 1].x.toFixed(2)},${baseY} L${points[0].x.toFixed(2)},${baseY} Z`;
        const grid = Array.from({ length: 5 }, (_, i) => {
          const ratio = i / 4;
          const y = pad.top + ratio * plotH;
          return `<line class="grid-line" x1="${pad.left}" x2="${width - pad.right}" y1="${y}" y2="${y}"></line><text class="axis" x="8" y="${y + 4}">${money(max * (1 - ratio))}</text>`;
        }).join("");
        const xLabels = points.filter((p) => p.day === 1 || p.day === totalDays || p.day % 5 === 0).map((p) => `<text class="axis" x="${p.x}" y="${height - 10}" text-anchor="middle">${p.day}</text>`).join("");
        const circles = points.map((p) => `<circle class="point" cx="${p.x}" cy="${p.y}" r="${p.value ? 4 : 3}" data-day="${p.day}" data-value="${p.value}"></circle>`).join("");
        $("#trendChart").innerHTML = `<defs><linearGradient id="trendGradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#d4af37" stop-opacity=".36"></stop><stop offset="70%" stop-color="#d4af37" stop-opacity=".08"></stop><stop offset="100%" stop-color="#d4af37" stop-opacity="0"></stop></linearGradient></defs>${grid}${xLabels}<path class="trend-area" d="${area}"></path><path class="trend-line" d="${line}"></path>${circles}`;
        bindChartTooltip();
      }
      function bindChartTooltip() {
        const tip = $("#chartTip");
        const wrap = $("#chartWrap");
        $$(".point").forEach((point) => {
          point.addEventListener("mousemove", (event) => {
            const rect = wrap.getBoundingClientRect();
            tip.innerHTML = `<strong>${monthKey()}-${pad2(point.dataset.day)}</strong><br><span class="money">${money(point.dataset.value)}</span>`;
            tip.style.left = `${event.clientX - rect.left + 12}px`;
            tip.style.top = `${event.clientY - rect.top - 8}px`;
            tip.classList.add("show");
          });
          point.addEventListener("mouseleave", () => tip.classList.remove("show"));
        });
      }

      function daysBetween(start, end = dateKey()) {
        const diff = parseDate(end).getTime() - parseDate(start).getTime();
        return Math.max(Math.floor(diff / 86400000), 0);
      }
      function followStatusMeta(status) {
        const map = {
          pending: { label: "待跟进", className: "" },
          reminded: { label: "已提醒", className: "reminded" },
          closed: { label: "已收齐", className: "closed" },
          lost: { label: "已流失", className: "lost" }
        };
        return map[status] || map.pending;
      }
      function pendingDepositOrders() {
        const orders = [];
        people.forEach((person) => {
          (state.entries[person.id] || []).forEach((entry) => {
            (entry.transactions || []).forEach((tx) => {
              if (tx.type !== "deposit") return;
              const amount = safeNumber(tx.amount);
              const orderAmount = safeNumber(tx.orderAmount) || amount;
              const pendingAmount = Math.max(orderAmount - amount, 0);
              const status = tx.followStatus || "pending";
              if (!pendingAmount || status === "closed" || status === "lost") return;
              orders.push({ person, entry, tx, amount, orderAmount, pendingAmount, status, days: daysBetween(entry.date) });
            });
          });
        });
        return orders.sort((a, b) => {
          const statusWeight = (item) => item.status === "pending" ? 1 : 0;
          return statusWeight(b) - statusWeight(a) || b.days - a.days || b.pendingAmount - a.pendingAmount;
        });
      }
      function renderFollowPool() {
        const orders = pendingDepositOrders();
        const pendingTotal = orders.reduce((sum, item) => sum + item.pendingAmount, 0);
        const orderTotal = orders.reduce((sum, item) => sum + item.orderAmount, 0);
        const overdueCount = orders.filter((item) => item.days >= 3 && item.status !== "reminded").length;
        const remindedCount = orders.filter((item) => item.status === "reminded").length;
        $("#followSummary").textContent = orders.length ? `${orders.length} 笔待跟进 · ${money(pendingTotal)} 待收` : "暂无待收尾款";
        $("#followStats").innerHTML = [
          followStat("待收尾款", money(pendingTotal), "定金订单剩余未收"),
          followStat("订单总额", money(orderTotal), `${orders.length} 笔定金订单`),
          followStat("超 3 天", `${overdueCount} 笔`, `已提醒 ${remindedCount} 笔`)
        ].join("");
        $("#followPool").innerHTML = orders.length ? orders.slice(0, 12).map(followCard).join("") : `<div class="empty" style="grid-column:1/-1;">目前没有待收尾款订单。定金订单标记“已收齐”或“流失”后，会自动从这里移除。</div>`;
        bindFollowPool();
      }
      function followStat(label, value, sub) {
        return `<div class="follow-stat"><span class="summary-label">${label}</span><strong>${value}</strong><p class="summary-small">${sub}</p></div>`;
      }
      function followCard(item) {
        const meta = followStatusMeta(item.status);
        const overdue = item.days >= 3 && item.status !== "reminded";
        const customerName = item.tx.customerName ? escapeHTML(item.tx.customerName) : "未填写客户";
        return `
          <article class="follow-card ${overdue ? "overdue" : ""} ${meta.className}" data-tx="${item.tx.id}">
            <div class="follow-top">
              <div class="follow-name"><strong>${customerName}</strong><span>${escapeHTML(item.person.name)} · ${escapeHTML(item.person.account)} · ${item.entry.date}</span></div>
              <span class="follow-status ${meta.className}">${overdue ? "需跟进" : meta.label}</span>
            </div>
            <div class="follow-money">
              <div><span>订单</span><strong class="money gold">${money(item.orderAmount)}</strong></div>
              <div><span>定金</span><strong class="money blue">${money(item.amount)}</strong></div>
              <div><span>待收</span><strong class="money red">${money(item.pendingAmount)}</strong></div>
            </div>
            <p class="summary-small">已等待 ${item.days} 天${item.status === "reminded" ? " · 已提醒客户" : ""}</p>
            <div class="follow-actions">
              <button type="button" class="btn" data-follow-open="${item.person.id}" data-date="${item.entry.date}">查看明细</button>
              <button type="button" class="btn cloud" data-follow-status="reminded" data-tx="${item.tx.id}">${item.status === "reminded" ? "再次提醒" : "已提醒"}</button>
              <button type="button" class="btn primary" data-follow-status="closed" data-tx="${item.tx.id}">已收齐</button>
              <button type="button" class="btn danger" data-follow-status="lost" data-tx="${item.tx.id}">流失</button>
            </div>
          </article>
        `;
      }
      function bindFollowPool() {
        $$("[data-follow-open]").forEach((button) => button.addEventListener("click", () => openTransactionModal(button.dataset.followOpen, button.dataset.date)));
        $$("[data-follow-status]").forEach((button) => button.addEventListener("click", () => updateDepositFollowStatus(button.dataset.tx, button.dataset.followStatus)));
      }
      function updateDepositFollowStatus(txIdValue, status) {
        if (!requireEdit()) return;
        let changed = null;
        people.some((person) => (state.entries[person.id] || []).some((entry) => {
          const tx = (entry.transactions || []).find((item) => item.id === txIdValue);
          if (!tx) return false;
          if (status === "closed" && !confirm("确认这笔定金订单已经收齐尾款？")) return true;
          if (status === "lost" && !confirm("确认将这笔定金订单标记为流失？")) return true;
          tx.followStatus = status;
          tx.followUpdatedAt = nowIso();
          recalcEntry(entry);
          markEntryUpdated(person.id, entry.date);
          changed = { person, entry, tx };
          return true;
        }));
        if (!changed) return;
        saveState();
        pushRemoteState();
        renderAll(changed.person.id);
        toast(`尾款跟进状态已更新：${followStatusMeta(status).label}`);
      }

      function renderQuickList() {
        const list = people.map((person) => ({ person, metrics: dayMetrics(person.id) })).sort((a, b) => b.metrics.total - a.metrics.total || b.metrics.transactionCount - a.metrics.transactionCount);
        const max = Math.max(...list.map((item) => item.metrics.total), 1);
        $("#quickList").innerHTML = list.map((item, index) => {
          const width = item.metrics.total ? (item.metrics.total / max) * 100 : 0;
          return `<div class="quick-item"><div class="quick-line"><strong>${index + 1}. ${escapeHTML(item.person.name)}</strong><span class="money">${money(item.metrics.total)}</span></div><div class="quick-line"><span>${escapeHTML(item.person.account)}</span><span>${item.metrics.transactionCount} 笔明细 / 成交单 ${item.metrics.dealsCount}</span></div><div class="bar"><i style="--w:${width}%"></i></div></div>`;
        }).join("");
      }

      function modalShell(title, sub, body, size = "wide") {
        return `<div class="modal ${size}" role="dialog" aria-modal="true"><div class="modal-head"><div><h2>${title}</h2><p class="modal-sub">${sub}</p></div><button type="button" class="close" data-close title="关闭">×</button></div><div class="modal-body">${body}</div></div>`;

      function openTransactionModal(personId, day = dateKey(), fresh = true) {

      function renderTransactionModal(focus = false) {
        const person = getPerson(txModal.personId);
        if (!person) return;
        const entry = getEntry(person.id, txModal.date);
        const metrics = summarizeEntry(entry);
        const txs = entry ? [...entry.transactions].reverse() : [];
        const body = `
          <div class="field" style="max-width:240px;margin-bottom:14px;"><label for="txDate">日期切换</label><input type="date" id="txDate" value="${txModal.date}"></div>
          <div class="summary-grid">
            ${txSummary("full", metrics.fullPayment, metrics.fullCount)}
            ${txSummary("deposit", metrics.deposit, metrics.depositCount, `计业绩 ${money(metrics.depositOrderAmount)}`)}
            ${txSummary("final", metrics.finalPayment, metrics.finalCount, "不计入业绩")}
            <div class="summary-card total"><p class="summary-label">当日实际成交</p><p class="summary-value">${money(metrics.total)}</p><p class="summary-small">${metrics.transactionCount} 笔</p></div>

      function txSummary(type, amount, count, extra = "") {

      function addTransaction() {
        if (!requireEdit()) return;
        const amount = safeNumber($("#txAmount").value);
        if (!amount) { toast("请输入有效收款金额"); $("#txAmount").focus(); return; }
        let orderAmount = 0;
        let customerName = "";
        if (txModal.type === "deposit") {
          customerName = $("#txCustomerName").value.trim();
          orderAmount = safeNumber($("#txOrderAmount").value);
          if (!orderAmount) { toast("请输入这笔定金对应的订单金额"); $("#txOrderAmount").focus(); return; }
          if (orderAmount < amount) { toast("订单金额不能小于定金到账金额"); $("#txOrderAmount").focus(); return; }
        }
        const entry = ensureEntry(txModal.personId, txModal.date);
        const tx = { id: txId(), amount, type: txModal.type };
        tx.createdAt = nowIso();
        if (txModal.type === "deposit") {
          tx.orderAmount = orderAmount;
          tx.customerName = customerName;
          tx.followStatus = "pending";
          tx.followUpdatedAt = tx.createdAt;
        }
        entry.transactions.push(tx);
        recalcEntry(entry);
        markEntryUpdated(txModal.personId, txModal.date);
        saveState();
        renderAll(txModal.personId);
        renderTransactionModal(true);
        toast("成交明细已新增");
      }
      function deleteTransaction(id) {
        if (!requireEdit()) return;
        const entry = getEntry(txModal.personId, txModal.date);
        if (!entry) return;
        const tx = entry.transactions.find((item) => item.id === id);
        if (!tx) return;
        if (!confirm(`确认删除这笔${typeMeta[tx.type].label} ${txText(tx)}？`)) return;
        markTransactionDeleted(tx.id);
        entry.transactions = entry.transactions.filter((item) => item.id !== id);
        recalcEntry(entry);
        markEntryUpdated(txModal.personId, txModal.date);
        saveState();
        pushRemoteState();
        renderAll(txModal.personId);
        renderTransactionModal(false);
        toast("成交明细已删除");

      function dailyRows(personId, month) {

      function resetCurrentMonth() {

        people.forEach((person) => {
          (state.entries[person.id] || []).filter((entry) => entry.date.startsWith(month)).forEach((entry) => {
            (entry.transactions || []).forEach((tx) => markTransactionDeleted(tx.id));

      function loadSyncConfig() {
        const embedded = {
          url: EMBEDDED_SUPABASE_CONFIG.url.trim(),
          anonKey: EMBEDDED_SUPABASE_CONFIG.anonKey.trim()
        };
        try {
          const raw = localStorage.getItem(SYNC_CONFIG_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          const saved = { url: parsed.url || "", anonKey: parsed.anonKey || "" };
          if (saved.url && saved.anonKey) return saved;
          if (embedded.url && embedded.anonKey && !embedded.anonKey.includes("PASTE_SUPABASE")) return embedded;
          return { url: "", anonKey: "" };
        } catch {
          if (embedded.url && embedded.anonKey && !embedded.anonKey.includes("PASTE_SUPABASE")) return embedded;
          return { url: "", anonKey: "" };
        }
      }
      function saveSyncConfig(config) {
        syncConfig = { url: String(config.url || "").trim(), anonKey: String(config.anonKey || "").trim() };
        localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify(syncConfig));
      }
      function hasSyncConfig() { return Boolean(syncConfig.url && syncConfig.anonKey); }
      function canEdit() { return true; }
      function requireEdit() { return true; }
      function renderAuthState() {

      }
      function openSyncModal() {
        const sql = `-- 这段 SQL 也已保存为 supabase_setup.sql\ncreate table if not exists public.sales_dashboard_state (\n  id text primary key,\n  data jsonb not null default '{}'::jsonb,\n  updated_at timestamptz not null default now()\n);\n\nalter table public.sales_dashboard_state enable row level security;\n\ngrant usage on schema public to anon, authenticated;\ngrant select, insert, update on public.sales_dashboard_state to anon;\ngrant select, insert, update on public.sales_dashboard_state to authenticated;\n\ndrop policy if exists \"sales_dashboard_select\" on public.sales_dashboard_state;\ndrop policy if exists \"sales_dashboard_insert\" on public.sales_dashboard_state;\ndrop policy if exists \"sales_dashboard_update\" on public.sales_dashboard_state;\n\ncreate policy \"sales_dashboard_select\" on public.sales_dashboard_state\nfor select to anon, authenticated\nusing (id = 'yuanpeng_a1');\n\ncreate policy \"sales_dashboard_insert\" on public.sales_dashboard_state\nfor insert to anon, authenticated\nwith check (id = 'yuanpeng_a1');\n\ncreate policy \"sales_dashboard_update\" on public.sales_dashboard_state\nfor update to anon, authenticated\nusing (id = 'yuanpeng_a1')\nwith check (id = 'yuanpeng_a1');\n\ndo $$\nbegin\n  alter publication supabase_realtime add table public.sales_dashboard_state;\nexception when duplicate_object then null;\nend $$;`;
        const body = `
          <form id="syncForm">
            <div class="form-grid">
              <div class="field"><label for="supabaseUrl">Supabase Project URL</label><input id="supabaseUrl" placeholder="https://xxxx.supabase.co" value="${escapeHTML(syncConfig.url)}"></div>
              <div class="field"><label for="supabaseKey">publishable / anon public key</label><input id="supabaseKey" placeholder="sb_publishable_... 或 eyJhbGciOi..." value="${escapeHTML(syncConfig.anonKey)}"></div>
            </div>
            <p class="hint">先在 Supabase SQL Editor 执行下方建表语句，再保存连接。这里填 publishable key 或 legacy anon key，不要填 secret/service_role key。</p>
            <div class="field"><label for="setupSql">Supabase 建表 SQL</label><textarea id="setupSql" readonly>${escapeHTML(sql)}</textarea></div>
            <div class="modal-actions">
              <button type="button" class="btn" id="copySqlBtn">复制 SQL</button>
              <button type="button" class="btn danger" id="clearSyncBtn">关闭云同步</button>
              <button type="submit" class="btn primary">保存并连接</button>
            </div>
          </form>
        `;
        openModal(modalShell("云端实时同步", "Supabase 配置一次后会保存在当前浏览器", body, "wide"), bindSyncModal);
      }
      function bindSyncModal() {
        $("#copySqlBtn").addEventListener("click", async () => {
          const sql = $("#setupSql").value;

            await navigator.clipboard.writeText(sql);
            toast("SQL 已复制");

            $("#setupSql").select();

        $("#clearSyncBtn").addEventListener("click", () => {

        $("#syncForm").addEventListener("submit", async (event) => {
          event.preventDefault();
          const url = $("#supabaseUrl").value.trim();
          const anonKey = $("#supabaseKey").value.trim();

            return;
          }
          if (/^(sb_secret_|eyJ).*(service_role)/i.test(anonKey) || anonKey.startsWith("sb_secret_")) {
            toast("不要填写 secret/service_role key，请换 publishable key");

          saveSyncConfig({ url, anonKey });
          closeModal();
          await initSupabase(true);

      function openAuthModal() {

      async function signOut() {
        if (!supabaseClient) return;
        await supabaseClient.auth.signOut();
        currentUser = null;
        renderAuthState();
        renderSyncStatus();
        toast("已退出编辑账号");

      async function setupAuth() {
        if (!supabaseClient) return;
        if (authSubscription) {
          authSubscription.unsubscribe();
          authSubscription = null;
        }
        const { data, error } = await supabaseClient.auth.getSession();
        if (error) console.warn(error);
        currentUser = data && data.session ? data.session.user : null;
        const auth = supabaseClient.auth.onAuthStateChange((_event, session) => {
          currentUser = session && session.user ? session.user : null;
          renderAuthState();
          renderSyncStatus();
        });
        authSubscription = auth.data.subscription;
        renderAuthState();
      }
      function syncErrorText(error) {
        return [
          error && error.message,
          error && error.details,
          error && error.hint,
          error && error.code ? `code: ${error.code}` : ""
        ].filter(Boolean).join(" / ") || "请检查 Supabase URL、key 和 SQL 权限";
      }
      async function initSupabase(showToast = false) {
        disconnectSupabase();
        remoteReady = false;
        renderSyncStatus("正在连接云端");
        if (!hasSyncConfig()) { renderSyncStatus("本地模式"); return; }
        if (!window.supabase || !window.supabase.createClient) {
          renderSyncStatus("Supabase CDN 加载失败");
          toast("Supabase 脚本加载失败，请检查网络或 CDN");
          return;
        }
        try {
          supabaseClient = window.supabase.createClient(syncConfig.url, syncConfig.anonKey);
          await pullRemoteState();
          subscribeRealtime();
          remoteReady = true;
          renderSyncStatus("Supabase 实时同步");
          if (showToast) toast("云端同步已连接");
        } catch (error) {
          console.error(error);
          remoteReady = false;
          const message = syncErrorText(error);
          renderSyncStatus("云端连接失败");
          toast(`云同步失败：${message}`);
          if (showToast) alert(`云同步失败：\n${message}`);
        }
      }
      function disconnectSupabase() {
        if (authSubscription) {
          authSubscription.unsubscribe();
          authSubscription = null;
        }
        if (realtimeChannel && supabaseClient) supabaseClient.removeChannel(realtimeChannel);
        realtimeChannel = null;
        supabaseClient = null;
        currentUser = null;
      }
      async function pullRemoteState() {
        if (!supabaseClient) return;
        const { data, error } = await supabaseClient.from(SUPABASE_TABLE).select("data").eq("id", CLOUD_ROW_ID).maybeSingle();
        if (error) throw error;
        if (data && data.data) {
          applyingRemote = true;
          state = normalizeState(data.data);
          saveState({ remote: false });
          applyingRemote = false;
          renderAll();
        } else {
          await pushRemoteState();
        }
      }
      function subscribeRealtime() {
        if (!supabaseClient) return;
        realtimeChannel = supabaseClient
          .channel("sales-dashboard-state")
          .on("postgres_changes", { event: "*", schema: "public", table: SUPABASE_TABLE, filter: `id=eq.${CLOUD_ROW_ID}` }, (payload) => {
            if (!payload.new || !payload.new.data) return;
            applyingRemote = true;
            state = normalizeState(payload.new.data);
            saveState({ remote: false });
            applyingRemote = false;
            renderAll();
            toast("云端数据已更新");
          })
          .subscribe((status) => {
            if (status === "SUBSCRIBED") {
              remoteReady = true;
              renderSyncStatus("Supabase 实时同步");
            }
            if (status === "CHANNEL_ERROR" || status === "TIMED_OUT" || status === "CLOSED") {
              remoteReady = false;
              renderSyncStatus("实时连接中断");
            }
          });
      }
      function queueRemoteSave() {
        if (!supabaseClient || !hasSyncConfig()) return;
        clearTimeout(remoteSaveTimer);
        remoteSaveTimer = setTimeout(() => pushRemoteState(), 220);
      }
      async function pushRemoteState() {
        if (!supabaseClient) return;
        renderSyncStatus("正在保存云端");
        let mergedState = state;
        const latest = await supabaseClient.from(SUPABASE_TABLE).select("data").eq("id", CLOUD_ROW_ID).maybeSingle();
        if (latest.error) {
          remoteReady = false;
          renderSyncStatus("保存前同步失败");
          toast(`保存前同步失败：${syncErrorText(latest.error)}`);
          return;
        }
        if (latest.data && latest.data.data) {
          mergedState = mergeStates(latest.data.data, state);
          state = mergedState;
          persistLocalState();
          renderAll();
        }
        const { error } = await supabaseClient.from(SUPABASE_TABLE).upsert({
          id: CLOUD_ROW_ID,
          data: mergedState,
          updated_at: new Date().toISOString()
        }, { onConflict: "id" });
        if (error) {
          remoteReady = false;
          renderSyncStatus("保存失败");
          const message = syncErrorText(error);
          toast(`云端保存失败：${message}`);
          if (message.includes("row-level security") || message.includes("permission") || message.includes("JWT")) {
            openAuthModal();
          }
          return;
        }
        remoteReady = true;
        renderSyncStatus("Supabase 实时同步");
      }

      function toast(message) {
        const node = document.createElement("div");
        node.className = "toast";
        node.textContent = message;
        $("#toastStack").appendChild(node);
        setTimeout(() => {
          node.style.opacity = "0";
          node.style.transform = "translateY(8px)";
          setTimeout(() => node.remove(), 220);
        }, 2200);
      }

      function bindEvents() {
        $$(".seg [data-sort]").forEach((button) => button.addEventListener("click", () => {
          sortMode = button.dataset.sort;
          $$(".seg [data-sort]").forEach((btn) => btn.classList.toggle("active", btn === button));
          renderRanking();
        }));
        $("#syncBtn").addEventListener("click", openSyncModal);
        $("#followBtn").addEventListener("click", () => $("#followPanel").scrollIntoView({ behavior: "smooth", block: "start" }));
        $("#goalsBtn").addEventListener("click", openGoalsModal);
        $("#metricsBtn").addEventListener("click", () => openMetricsModal());
        $("#resetBtn").addEventListener("click", resetCurrentMonth);
        $("#ranking").addEventListener("click", (event) => {
          const action = event.target.closest("[data-action]");
          if (action) {
            const personId = action.dataset.person;
            if (action.dataset.action === "details") openMonthlyDetail(personId);
            if (action.dataset.action === "tx") openTransactionModal(personId);
            if (action.dataset.action === "metrics") openMetricsModal(personId);
            return;
          }
          const cell = event.target.closest(".money-cell");
          if (cell) openTransactionModal(cell.dataset.person);
        });
        $("#modalLayer").addEventListener("mousedown", (event) => { if (event.target.id === "modalLayer") closeModal(); });
        document.addEventListener("keydown", (event) => { if (event.key === "Escape" && $("#modalLayer").classList.contains("open")) closeModal(); });
      }

      bindEvents();
      renderAll();
      initSupabase(false);
      setInterval(renderDate, 60000);
    })();
  </script>
</body>
</html>
